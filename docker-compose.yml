version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cityquiz
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cityquiz"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

volumes:
  pgdata:
